[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 57600
upload_flags =
	--no-stub
board_build.flash_mode = dio
build_flags =
	-DSFE_UBLOX_REDUCED_PROG_MEM
	-DSFE_UBLOX_DISABLE_AUTO_NMEA

; If you want PlatformIO to auto-install libraries, set `lib_deps` below.
lib_deps =
	adafruit/Adafruit MPU6050@^2.2.6
	adafruit/Adafruit HMC5883 Unified@^1.2.4
	https://github.com/sparkfun/SparkFun_u-blox_GNSS_Arduino_Library.git
